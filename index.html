<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba Ultra | AI Code Generator</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Glassmorphism UI */
        header { 
            padding: 20px; 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        
        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; }
        
        #prompt-box { 
            flex: 1; 
            background: rgba(255,255,255,0.03); 
            border: 2px solid var(--neon); 
            border-radius: 15px; 
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        textarea { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            font-size: 1.2rem; 
            outline: none; 
            resize: none;
        }

        .btn-generate { 
            background: var(--neon); 
            color: black; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-generate:hover { box-shadow: 0 0 20px var(--neon); transform: translateY(-2px); }

        #output-frame { 
            flex: 1; 
            background: white; 
            border-radius: 15px; 
            border: none; 
        }

        .code-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 10px;
            color: #00ff00;
            max-width: 300px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; letter-spacing: 5px;">MAMBA <span style="color:var(--neon)">ULTRA</span> ENGINE</h1>
    <p>Upiši šta želiš da napraviš i Mamba će stvoriti kod.</p>
</header>

<div class="main-container">
    <div id="prompt-box">
        <h3>Šta pravimo danas?</h3>
        <textarea id="userInput" placeholder="Primer: Napravi crveni krug koji prati miš i broji klikove..."></textarea>
        <button class="btn-generate" onclick="generateAndRun()">GENERISI I POKRENI APLIKACIJU</button>
    </div>

    <iframe id="output-frame"></iframe>
</div>

<div class="code-preview" id="codeView">// Ovde će se videti generisani Mamba kod...</div>

<script>
    function generateAndRun() {
        const prompt = document.getElementById('userInput').value.toLowerCase();
        const frame = document.getElementById('output-frame');
        const codeView = document.getElementById('codeView');
        
        let generatedHTML = "";
        let generatedJS = "";

        // MAMBA ENGINE LOGIKA - Pretvaranje teksta u STVARNI KOD
        if (prompt.includes("krug") || prompt.includes("krug koji prati mis")) {
            generatedHTML = `<div id='player' style='width:50px; height:50px; background:red; border-radius:50%; position:absolute;'></div>`;
            generatedJS = `
                const p = document.getElementById('player');
                document.onmousemove = (e) => {
                    p.style.left = e.pageX - 25 + 'px';
                    p.style.top = e.pageY - 25 + 'px';
                };
                let score = 0;
                p.onclick = () => { score++; alert('Klikova: ' + score); };
            `;
        } else if (prompt.includes("kalkulator")) {
            generatedHTML = `
                <div style="padding:20px; font-family:sans-serif;">
                    <input id="n1" type="number"> + <input id="n2" type="number">
                    <button onclick="res()">Izracunaj</button>
                    <h1 id="r">0</h1>
                </div>`;
            generatedJS = `function res() { 
                document.getElementById('r').innerText = 
                Number(document.getElementById('n1').value) + Number(document.getElementById('n2').value); 
            }`;
        } else {
            generatedHTML = `<h1>Mamba ne prepoznaje komandu. Pokušaj sa 'krug' ili 'kalkulator'.</h1>`;
        }

        // PAKOVANJE U FINALNU APLIKACIJU
        const finalApp = `
            <html>
                <body style="margin:0; overflow:hidden;">
                    ${generatedHTML}
                    <script>${generatedJS}<\/script>
                </body>
            </html>
        `;

        // Prikaz koda (da vidiš da je stvarno generisan)
        codeView.innerText = "// GENERISAN KOD:\n" + generatedJS;

        // POKRETANJE APLIKACIJE
        const blob = new Blob([finalApp], {type: 'text/html'});
        frame.src = URL.createObjectURL(blob);
    }
</script>

</body>
</html>
