<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba Ultra IDE - Najbrži Jezik</title>
    
    <meta name="theme-color" content="#00d4ff">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #00ff88;
            --bg-dark: #0a0a12;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Navigation */
        header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            background: radial-gradient(circle at top right, #16213e, #0a0a12);
        }

        /* Editor Section */
        #editor-wrapper {
            flex: 2;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1.1rem;
            outline: none;
            resize: none;
            line-height: 1.5;
        }

        /* Console/Output Section */
        #output-wrapper {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px;
            font-family: monospace;
            color: #ddd;
            overflow-y: auto;
        }

        .btn-compile {
            background: linear-gradient(45deg, var(--neon-blue), #0044ff);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s all;
            text-transform: uppercase;
        }

        .btn-compile:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        h3 { margin-top: 0; color: var(--neon-blue); font-size: 0.9rem; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="logo">MAMBA ULTRA</div>
    <button class="btn-compile" onclick="runMamba()">POKRENI KOD</button>
</header>

<div class="main-container">
    <div id="editor-wrapper">
        <h3>Mamba Editor (.mamba)</h3>
        <textarea id="mambaInput" placeholder="// Piši normalan tekst ovde...
napravi bot sa tokenom '123'
ispisi 'Mamba je najbrza'
"></textarea>
    </div>

    <div id="output-wrapper">
        <h3>Konzola / Rezultat</h3>
        <div id="consoleOutput">> Čekam kod...</div>
    </div>
</div>

<script>
    // CORE PREVODILAC (COMPILER)
    // Ovde definišeš kako se tvoj "normalan tekst" pretvara u kod
    function compileMamba(text) {
        let lines = text.split('\n');
        let jsCode = "";

        lines.forEach(line => {
            let trimLine = line.trim();
            
            // 1. Komanda za ispis
            if (trimLine.startsWith('ispisi ')) {
                let content = trimLine.replace('ispisi ', '');
                jsCode += `console.log(${content}); appendOutput(${content});\n`;
            }
            
            // 2. Komanda za Discord Bot (Primer logike)
            if (trimLine.includes('napravi bot')) {
                jsCode += `appendOutput('Inicijalizujem Discord Bota... Brzina: 0.001ms');\n`;
            }

            // 3. Brza petlja
            if (trimLine.startsWith('ponovi ')) {
                let num = trimLine.match(/\d+/);
                jsCode += `for(let i=0; i<${num}; i++) {\n`;
            }
            if (trimLine === 'kraj') {
                jsCode += `}\n`;
            }
        });

        return jsCode;
    }

    function appendOutput(msg) {
        const out = document.getElementById('consoleOutput');
        out.innerHTML += `<div>> ${msg}</div>`;
    }

    function runMamba() {
        const input = document.getElementById('mambaInput').value;
        const out = document.getElementById('consoleOutput');
        out.innerHTML = "<div>> Kompajliranje...</div>";
        
        try {
            const compiled = compileMamba(input);
            eval(compiled); // Izvršava prevedeni kod
        } catch (e) {
            appendOutput("GRESKA: " + e.message);
        }
    }
</script>

</body>
</html>
