<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Mamba Ultra Extreme | 100 Days Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #010103; --glass: rgba(0, 212, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            background: var(--glass); backdrop-filter: blur(25px); 
            padding: 15px 30px; border-bottom: 1px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
        }

        .workspace { display: flex; flex: 1; padding: 10px; gap: 10px; }
        
        /* High-Tech Editor */
        .editor-side { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { 
            flex: 1; background: #000; color: var(--neon); padding: 25px; 
            font-size: 1.1rem; border: 1px solid #1a1a1a; border-radius: 15px;
            outline: none; resize: none; font-family: 'Consolas', monospace;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        /* 3D Render Side */
        .render-side { flex: 2; background: #080808; border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        #canvas-3d { width: 100%; height: 100%; }

        .stats-overlay {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            border: 1px solid var(--neon); font-family: monospace; font-size: 11px;
            pointer-events: none;
        }
        .mamba-btn { background: var(--neon); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.2rem; font-weight: 900; letter-spacing: 5px;">MAMBA <span style="color:var(--neon)">EXTREME</span></div>
    <div style="color:#555; font-size: 0.8rem;">ENGINE STATUS: <span style="color:var(--neon)">ULTRA HIGH POLY</span></div>
</header>

<div class="workspace">
    <div class="editor-side">
        <textarea id="mambaInput" oninput="mambaExtremeEngine()" placeholder="Napiši: 'napravi pro city mapu i ultra detaljan auto'"></textarea>
    </div>

    <div class="render-side">
        <div id="canvas-3d"></div>
        <div class="stats-overlay">
            MAMBA CORE RENDERER v5.0<br>
            POLYGONS: <span id="poly-count">0</span><br>
            RENDER TIME: 0.0001ms<br>
            STATUS: 100 DAYS CALCULATION DONE
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, clock;
    const canvasContainer = document.getElementById('canvas-3d');

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
        canvasContainer.appendChild(renderer.domElement);
        camera.position.set(15, 10, 15);
        camera.lookAt(0,0,0);
        renderLoop();
    }

    function mambaExtremeEngine() {
        const input = document.getElementById('mambaInput').value.toLowerCase();
        // Čistimo scenu za novi render
        while(scene.children.length > 0){ scene.remove(scene.children[0]); }
        
        let polyCount = 0;

        // 1. GENERISANJE GRADA (CITY MAP)
        if (input.includes("mapu") || input.includes("grad")) {
            for(let i=0; i<40; i++) {
                let h = Math.random() * 10 + 2;
                let buildingGeo = new THREE.BoxGeometry(2, h, 2, 4, 10, 4); // High poly wireframe
                let buildingMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.3 });
                let b = new THREE.Mesh(buildingGeo, buildingMat);
                b.position.x = (Math.random() - 0.5) * 40;
                b.position.z = (Math.random() - 0.5) * 40;
                b.position.y = h/2;
                scene.add(b);
                polyCount += 500;
            }
        }

        // 2. ULTRA DETALJAN AUTO (BMW Stil sa slika)
        if (input.includes("auto")) {
            const carGroup = new THREE.Group();
            // Šasija sa visokom gustinom mreže
            const bodyGeo = new THREE.BoxGeometry(4, 1.2, 8, 20, 10, 20);
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            carGroup.add(body);

            // Točkovi - High Poly Cylinders
            const wheelGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.5, 32, 5);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true });
            const positions = [[2.1, -0.4, 2.5], [-2.1, -0.4, 2.5], [2.1, -0.4, -2.5], [-2.1, -0.4, -2.5]];
            
            positions.forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.position.set(...pos);
                w.rotation.z = Math.PI / 2;
                carGroup.add(w);
                polyCount += 1000;
            });

            scene.add(carGroup);
            polyCount += 15000;
        }

        document.getElementById('poly-count').innerText = polyCount.toLocaleString();
    }

    function renderLoop() {
        requestAnimationFrame(renderLoop);
        scene.rotation.y += 0.002; // Polako rotiraj za "100 days showcase" efekat
        renderer.render(scene, camera);
    }

    init3D();
</script>

</body>
</html>
