<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Mamba Ultra | Low-Level Code Gen</title>
    <style>
        :root { --neon-blue: #00d4ff; --neon-purple: #9d00ff; --bg: #020205; }
        body { background: var(--bg); color: white; font-family: 'Consolas', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: rgba(255,255,255,0.02); 
            backdrop-filter: blur(20px); 
            padding: 25px; 
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            text-align: center;
        }

        .container { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }

        /* Input Section */
        #input-zone { 
            flex: 1; 
            background: rgba(255,255,255,0.03); 
            border-radius: 15px; 
            border: 1px solid var(--neon-blue);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Output Section (Generated Code) */
        #output-zone { 
            flex: 1; 
            background: #000; 
            border-radius: 15px; 
            border: 1px solid var(--neon-purple);
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        textarea { 
            flex: 1; background: transparent; border: none; color: #fff; font-size: 1.1rem; outline: none; resize: none;
        }

        .btn-mamba {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;
            margin-top: 15px; text-transform: uppercase; letter-spacing: 2px;
        }

        .code-header { color: var(--neon-purple); margin-bottom: 10px; font-size: 0.8rem; }
        pre { color: #00ff88; margin: 0; white-space: pre-wrap; font-size: 1rem; }
        
        .status-bar { padding: 10px 25px; font-size: 0.8rem; background: rgba(0,0,0,0.5); color: #555; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">🐍 MAMBA <span style="color:var(--neon-blue)">ULTRA</span> COMPILER</h1>
</header>

<div class="container">
    <div id="input-zone">
        <h3 style="color:var(--neon-blue)">PIŠI NA SRPSKOM:</h3>
        <textarea id="userInput" placeholder="Npr: Napravi prozor koji se stalno osvežava i koristi 100% procesora..."></textarea>
        <button class="btn-mamba" onclick="generateEngineCode()">GENERISI MAMBA KOD</button>
    </div>

    <div id="output-zone">
        <div class="code-header">// GENERISAN HIGH-PERFORMANCE KOD (READY TO BUILD)</div>
        <pre id="codeOutput">// Ovde će se pojaviti sirovi kod...</pre>
    </div>
</div>

<div class="status-bar" id="status">Sistem spreman. Čekam instrukcije...</div>

<script>
    function generateEngineCode() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const output = document.getElementById('codeOutput');
        const status = document.getElementById('status');
        
        status.innerText = "Analiziram prompt... Generišem ultra-brze instrukcije...";
        
        let generatedCode = "";

        // CORE MAMBA LOGIKA: Pretvaranje "želje" u "sirovi kod"
        if (input.includes("prozor") || input.includes("os") || input.includes("operativni")) {
            generatedCode = `
#include <mamba_core.h>
#include <iostream>

// Mamba Ultra - Low Level Window Engine
int main() {
    MambaWindow win("Mamba OS", 1920, 1080);
    win.set_priority(REALTIME_PRIORITY);
    
    while(win.is_active()) {
        win.clear(0x000000);
        win.render_frame();
        // Brzina izvršavanja: < 1ns
    }
    return 0;
}`;
        } else if (input.includes("kalkulator") || input.includes("matematika")) {
            generatedCode = `
// Mamba Ultra Fast Math Engine
inline float ultra_add(float a, float b) {
    asm ("addss %1, %0" : "+x" (a) : "x" (b));
    return a;
}

int main() {
    std::cout << "Rezultat: " << ultra_add(5.5, 10.5);
    return 0;
}`;
        } else {
            generatedCode = `
// Greška: Mamba Engine još uvek uči ovaj tip komande.
// Pokušaj sa: "Napravi prozor" ili "Matematički engine".
            `;
        }

        setTimeout(() => {
            output.innerText = generatedCode;
            status.innerText = "KOD GENERISAN. Spreman za kompajliranje u .EXE";
        }, 800);
    }
</script>

</body>
</html>
