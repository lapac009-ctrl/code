<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Mamba Ultra | Pro Game & App Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00d4ff; --bg: #030307; --glass: rgba(255,255,255,0.03); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            background: var(--glass); backdrop-filter: blur(20px); 
            padding: 20px; border-bottom: 2px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .nav-tabs { display: flex; gap: 15px; }
        .tab-btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); 
            padding: 10px 20px; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        .workspace { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        
        /* Editor Side */
        .editor-container { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { 
            flex: 1; background: rgba(0,0,0,0.5); color: #00ff88; padding: 20px; 
            font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            outline: none; resize: none; font-family: 'Consolas', monospace;
        }

        /* Preview Side */
        .preview-container { flex: 1.5; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        #output-canvas { width: 100%; height: 100%; }

        /* Multi-Language Code View */
        .code-export { 
            position: absolute; bottom: 0; width: 100%; height: 40%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--neon); padding: 15px; font-size: 0.85rem;
            overflow-y: auto; color: #aaa; display: none;
        }
        .code-export b { color: var(--neon); }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.5rem; font-weight: 900;">MAMBA <span style="color:var(--neon)">ULTRA</span> PRO</div>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="setMode('3d')">3D GAME ENGINE</button>
        <button class="tab-btn" onclick="setMode('app')">APP FACTORY (C#/JAVA/WEB)</button>
    </div>
</header>

<div class="workspace">
    <div class="editor-container">
        <textarea id="mambaInput" oninput="mambaEngine()" placeholder="3D: napravi auto sa 4 tocka i mapu...
APP: napravi moderan login sa bazom i C# backendom..."></textarea>
    </div>

    <div class="preview-container">
        <div id="output-canvas"></div>
        <div id="codeExportView" class="code-export"></div>
    </div>
</div>

<script>
    let mode = '3d';
    const canvas = document.getElementById('output-canvas');
    const codeView = document.getElementById('codeExportView');

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        codeView.style.display = (m === 'app') ? 'block' : 'none';
        mambaEngine();
    }

    function mambaEngine() {
        const input = document.getElementById('mambaInput').value.toLowerCase();
        canvas.innerHTML = "";
        
        if (mode === '3d') {
            runPro3D(input);
        } else {
            runProApp(input);
        }
    }

    // --- PRO 3D ENGINE (Cars, Wheels, Maps) ---
    function runPro3D(input) {
        if (!input.includes("napravi")) return;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        canvas.appendChild(renderer.domElement);

        // MAPA / POD
        if (input.includes("mapu")) {
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x111111, wireframe: true });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = Math.PI / 2;
            scene.add(floor);
        }

        // AUTO KONSTRUKCIJA
        if (input.includes("auto")) {
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 4), new THREE.MeshBasicMaterial({color: 0xff0000}));
            scene.add(body);
            
            // Točkovi
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 32);
            const wheelMat = new THREE.MeshBasicMaterial({color: 0x444444});
            const positions = [[1.1, -0.3, 1.5], [-1.1, -0.3, 1.5], [1.1, -0.3, -1.5], [-1.1, -0.3, -1.5]];
            
            positions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(...pos);
                wheel.rotation.z = Math.PI / 2;
                scene.add(wheel);
            });
            body.position.y = 0.5;
        }

        camera.position.set(5, 5, 10);
        camera.lookAt(0,0,0);

        function anim() {
            requestAnimationFrame(anim);
            renderer.render(scene, camera);
        }
        anim();
    }

    // --- PRO APP FACTORY (Multi-Language Export) ---
    function runProApp(input) {
        let htmlPreview = `<div style="padding:20px; background:#111; height:100%; color:white; font-family:sans-serif;">`;
        let exportedCode = "";

        if (input.includes("login")) {
            htmlPreview += `
                <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:15px; border:1px solid #00d4ff; max-width:300px; margin:auto;">
                    <h2 style="color:#00d4ff">MAMBA LOGIN</h2>
                    <input type="text" placeholder="User" style="width:100%; margin:10px 0; padding:10px; background:#222; border:1px solid #333; color:white;">
                    <button style="width:100%; padding:10px; background:#00d4ff; border:none; font-weight:bold; cursor:pointer;">CONNECT</button>
                </div>`;

            exportedCode = `
<b>// C# BACKEND (MambaCore.cs)</b>
public class DatabaseConnector {
    public void Connect() { Console.WriteLine("Mamba DB Connected!"); }
}

<b>// JAVA MOBILE (Main.java)</b>
public class MambaApp {
    public static void main(String[] args) { System.out.println("App Started"); }
}

<b>// HTML/CSS (UI.html)</b>
&lt;button class="neon-btn"&gt;Mamba Login&lt;/button&gt;
            `;
        }

        canvas.innerHTML = htmlPreview + "</div>";
        codeView.innerHTML = exportedCode;
    }
</script>

</body>
</html>
